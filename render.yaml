services:
  # 1. Backend Web Service
  - type: web
    name: cleannigeria-backend
    env: node
    plan: free
    rootDir: cleannigeria-backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: cleannigeria-client
          property: host
      - key: ADMIN_URL
        fromService:
          type: web
          name: cleannigeria-admin
          property: host
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ADMIN_ACCESS_SECRET
        generateValue: true
      - key: JWT_ADMIN_REFRESH_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: SESSION_SECRET
        generateValue: true

  # 2. Client Dashboard Static Site
  - type: web
    name: cleannigeria-client
    env: static
    rootDir: cleannigeria-client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: cleannigeria-backend
          property: host
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: cleannigeria-backend
          property: host
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false

  # 3. Admin Dashboard Static Site
  - type: web
    name: cleannigeria-admin
    env: static
    rootDir: cleannigeria-admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: cleannigeria-backend
          property: host
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: cleannigeria-backend
          property: host
