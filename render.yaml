services:
  # 1. Backend Web Service
  - type: web
    name: cleannigeria-backend
    env: node
    plan: free
    rootDir: cleannigeria-backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@cleannigeria.org

  # 2. Client Dashboard Static Site
  - type: web
    name: cleannigeria-client
    env: static
    rootDir: cleannigeria-client
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false

  # 3. Admin Dashboard Static Site
  - type: web
    name: cleannigeria-admin
    env: static
    rootDir: cleannigeria-admin
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
